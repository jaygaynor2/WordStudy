apiVersion: apps/v1
kind: Deployment
metadata:
  name: word-study
spec:
  replicas: 2
  selector:
    matchLabels:
      app: word-study
  template:
    metadata:
      labels:
        app: word-study
    spec:
      containers:
        - name: word-study
          image: wordstudy.azurecr.io/word-study:latest
          ports:
            - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: word-study
spec:
  type: LoadBalancer
  selector:
    app: word-study
  ports:
    - port: 80
      targetPort: 80
